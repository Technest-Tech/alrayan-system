<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 68" fill="none" aria-label="Azhary">
  <!-- Geometric mark: 8-pointed star in gold -->
  <g transform="translate(8,8)">
    <!-- Outer octagon -->
    <polygon
      points="26,0 38,10 52,10 52,24 62,34 52,44 52,58 38,58 26,68 14,58 0,58 0,44 -10,34 0,24 0,10 14,10"
      transform="scale(0.76) translate(2,0)"
      fill="#C9A24B"
      opacity="0.15"
    />
    <!-- Inner 8-pointed star -->
    <path
      d="M26 4 L30 14 L40 10 L36 20 L46 24 L36 28 L40 38 L30 34 L26 44 L22 34 L12 38 L16 28 L6 24 L16 20 L12 10 L22 14 Z"
      transform="scale(0.76) translate(2,0)"
      fill="#C9A24B"
    />
    <!-- Center diamond -->
    <rect x="20" y="20" width="12" height="12" rx="1" transform="rotate(45 26 26)" fill="#0B1F3A"/>
  </g>

  <!-- Arabic wordmark: أزهري -->
  <text
    x="80"
    y="30"
    font-family="Amiri, Georgia, serif"
    font-size="22"
    font-weight="700"
    fill="#0B1F3A"
    text-anchor="start"
    direction="rtl"
    unicode-bidi="bidi-override"
  >أزهري</text>

  <!-- English wordmark: Azhary -->
  <text
    x="80"
    y="50"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="13"
    font-weight="600"
    letter-spacing="0.08em"
    fill="#5A6470"
    text-anchor="start"
  >AZHARY</text>

  <!-- Gold accent line between Arabic and English -->
  <rect x="80" y="34" width="100" height="1.5" rx="1" fill="#C9A24B" opacity="0.7"/>
</svg>
